a2c:
  learning_rate: [1e-5, 1e-3]
  n_steps: [2, 20]
  gamma: [0.9, 0.999]
  gae_lambda: [0.85, 1.0]
  ent_coef: [0.0, 0.02]

ppo:
  learning_rate: [1e-5, 1e-3]
  n_steps: [512, 4096]
  gamma: [0.9, 0.999]
  gae_lambda: [0.85, 1.0]
  ent_coef: [0.0, 0.02]
  clip_range: [0.1, 0.3]
  batch_size: [32, 512]
  n_epochs: [3, 10]

dqn:
  learning_rate: [1e-5, 1e-3]
  n_steps: [1, 5]
  gamma: [0.9, 0.999]
  batch_size: [32, 256]
  buffer_size: [50000, 1000000]
  learning_starts: [100, 500]
  train_freq: [1, 8]
  gradient_steps: [1, 8]
  target_update_interval: [1000, 10000]
  exploration_fraction: [0.10, 0.20]
  exploration_final_eps: [0.01, 0.10]
